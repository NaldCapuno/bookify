name: bookkeeping
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  google_fonts: ^8.0.1
  drift: ^2.31.0
  drift_flutter: ^0.2.8  
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  pdf: ^3.10.8
  printing: ^5.11.1
  grouped_list: ^6.0.0
  sticky_headers: ^0.3.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.31.0
  build_runner: ^2.11.1
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true

  assets:
    - assets/images/google_logo.png
    - assets/images/k1.png

flutter_icons:
  android: true
  image_path: "assets/images/logo.png"