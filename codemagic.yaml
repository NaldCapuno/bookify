# lib/codemagic.yaml (Minimalist Free Version)
workflows:
  ios-free-workflow:
    name: Bookify iOS Unsigned Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
          flutter pub run flutter_launcher_icons

      - name: Build Unsigned IPA
        script: | 
          # The --no-codesign flag prevents the "Payment/App ID" requirement
          flutter build ios --release --no-codesign
          
          # Manually package into an IPA for Sideloadly
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos && zip -r Bookify.ipa Payload

    artifacts:
      - build/ios/iphoneos/Bookify.ipa